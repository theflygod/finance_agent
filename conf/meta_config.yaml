metrics:
- name: 新增客户数
  description: 统计指定时间段内新注册的客户数量，按customer.created_at筛选，customer_status不为closed
  alias:
  - 新用户数
  - 新注册客户数
  - 新开户客户数
  relevant_columns:
  - customer.id
  - customer.created_at
  - customer.customer_status
- name: 活跃客户数
  description: 统计状态为active的客户数量
  alias:
  - 活跃用户数
  - 有效客户数
  relevant_columns:
  - customer.id
  - customer.customer_status
- name: 正常账户数
  description: 统计状态为active的银行账户数量
  alias:
  - 活跃账户数
  - 有效账户数
  relevant_columns:
  - bank_account.id
  - bank_account.account_status
- name: 交易金额
  description: 统计成功交易的金额总和，按transaction_status=success筛选
  alias:
  - 交易总额
  - 成交金额
  - 交易额
  relevant_columns:
  - account_transaction.amount
  - account_transaction.transaction_status
- name: 交易笔数
  description: 统计成功交易的笔数，按transaction_status=success筛选
  alias:
  - 交易次数
  - 交易量
  relevant_columns:
  - account_transaction.id
  - account_transaction.transaction_status
- name: 理财持仓规模
  description: 统计所有活跃持仓的市值金额总和，按position_status=active筛选
  alias:
  - AUM
  - 理财规模
  - 持仓规模
  - 理财管理规模
  relevant_columns:
  - wealth_position.market_value_amount
  - wealth_position.position_status
- name: 理财订单金额
  description: 统计理财订单的金额总和，可按order_type区分申购和赎回
  alias:
  - 申购金额
  - 赎回金额
  - 理财成交额
  relevant_columns:
  - wealth_order.order_amount
  - wealth_order.order_type
  - wealth_order.order_status
- name: 贷款申请数
  description: 统计贷款申请的数量
  alias:
  - 贷款申请笔数
  - 申请数
  relevant_columns:
  - loan_application.id
  - loan_application.application_status
- name: 放款金额
  description: 统计成功放款的金额总和，按disbursement_status=success筛选
  alias:
  - 放款额
  - 放款总额
  - 贷款发放额
  relevant_columns:
  - loan_disbursement.disbursement_amount
  - loan_disbursement.disbursement_status
- name: 贷款余额
  description: 统计状态为active的贷款合同的合同金额总和
  alias:
  - 贷款本金余额
  - 借据余额
  relevant_columns:
  - loan_contract.contract_amount
  - loan_contract.contract_status
- name: 还款金额
  description: 统计成功还款的金额总和，按repayment_status=success筛选
  alias:
  - 还款总额
  - 还款额
  relevant_columns:
  - repayment_record.repayment_amount
  - repayment_record.repayment_status
- name: 逾期余额
  description: 统计逾期状态为active的逾期总额
  alias:
  - 逾期金额
  - 逾期总额
  - 逾期本金
  relevant_columns:
  - overdue_record.overdue_amount
  - overdue_record.overdue_status
- name: 风险事件数
  description: 统计风险事件的数量
  alias:
  - 风控事件数
  - 风险预警数
  relevant_columns:
  - risk_event.id
  - risk_event.event_status
- name: 催收回收率
  description: 催收回收金额占逾期金额的比例
  alias:
  - 催收回收比例
  - 回收率
  relevant_columns:
  - collection_performance_daily.recovery_rate
  - collection_performance_daily.recovered_amount
- name: 贷款审批通过率
  description: 贷款申请状态为approved的数量占总申请数量的比例
  alias:
  - 审批通过率
  - 通过率
  relevant_columns:
  - loan_application.id
  - loan_application.application_status
- name: 授信额度
  description: 统计有效授信的额度总和，按credit_status=active筛选
  alias:
  - 授信总额
  - 总授信额度
  relevant_columns:
  - credit_limit.credit_amount
  - credit_limit.credit_status
- name: 账户余额
  description: 统计所有正常账户的余额总和
  alias:
  - 存款余额
  - 总余额
  relevant_columns:
  - bank_account.balance
  - bank_account.account_status
- name: 累计收益
  description: 统计理财持仓的累计收益金额总和
  alias:
  - 理财收益
  - 总收益
  relevant_columns:
  - wealth_position.accumulated_income_amount
  - wealth_position.position_status
